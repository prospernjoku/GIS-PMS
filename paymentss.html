<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style type="text/tailwindcss">
    :root {
      --primary-green: #004d00;
      --light-green: #e6f2e6;
      --text-green: #002600;
      --accent-green: #008000;
    }
    body {
      font-family: "Public Sans", "Noto Sans", sans-serif;
    }
  </style>
  <title>User Dashboard - Renewed Hope</title>
</head>
<body class="bg-white">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-[var(--primary-green)] text-white flex flex-col p-6">
      <!-- Profile Section -->
      <div class="flex flex-col items-center mb-6">
        <img src="https://via.placeholder.com/100" alt="User Profile" class="rounded-full w-24 h-24 mb-3 border-4 border-white">
        <h2 class="text-lg font-bold">User Dashboard</h2>
      </div>
      <!-- Navigation Menu -->
      <nav class="flex flex-col space-y-3">
        <a href="user.html" class="hover:bg-white hover:text-[var(--primary-green)] px-3 py-2 rounded">Dashboard</a>
        <a href="application.html" class="hover:bg-white hover:text-[var(--primary-green)] px-3 py-2 rounded">Applications</a>
        <a href="myproperties.html" class="hover:bg-white hover:text-[var(--primary-green)] px-3 py-2 rounded">Properties</a>
        <a href="payments.html" class="hover:bg-white hover:text-[var(--primary-green)] px-3 py-2 rounded">Payments</a>
        <a href="inspections.html" class="hover:bg-white hover:text-[var(--primary-green)] px-3 py-2 rounded">Inspections</a>
        <a href="profile.html" class="hover:bg-white hover:text-[var(--primary-green)] px-3 py-2 rounded">Profile</a>
        <a href="messages.html" class="hover:bg-white hover:text-[var(--primary-green)] px-3 py-2 rounded">Messages</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
      <header class="border-b pb-4 mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-[var(--primary-green)]">Profile & Document Upload (KYC)</h1>
      </header>

      <!-- Form Section (same as original, shortened for brevity) -->
      <div class="space-y-6 max-w-lg">
        <div>
          <label class="block text-sm font-medium text-gray-700">Full Name</label>
          <input type="text" class="mt-1 block w-full rounded-md border-gray-300 bg-[#f0f2f4] h-12 px-4"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Email Address</label>
          <input type="email" class="mt-1 block w-full rounded-md border-gray-300 bg-[#f0f2f4] h-12 px-4"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Phone Number</label>
          <input type="text" class="mt-1 block w-full rounded-md border-gray-300 bg-[#f0f2f4] h-12 px-4"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Address</label>
          <input type="text" class="mt-1 block w-full rounded-md border-gray-300 bg-[#f0f2f4] h-12 px-4"/>
        </div>

        <h2 class="text-xl font-bold text-[var(--primary-green)]">Document Upload</h2>
        <p class="text-gray-600">Upload ID, utility bill, payslip (PDF, JPG, PNG, max 5MB).</p>

        <div>
          <label class="block text-sm font-medium text-gray-700">National ID / Passport</label>
          <input type="file" class="mt-1 block w-full text-gray-700"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Utility Bill</label>
          <input type="file" class="mt-1 block w-full text-gray-700"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Payslip</label>
          <input type="file" class="mt-1 block w-full text-gray-700"/>
        </div>

        <button class="bg-[var(--primary-green)] text-white px-6 py-2 rounded-md font-bold hover:bg-green-700">Save Changes</button>
      </div>
    </main>
  </div>
</body>
</html>
